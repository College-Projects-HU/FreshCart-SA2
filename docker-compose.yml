version: "3.8"

services:
  # ── Databases ──────────────────────

  users-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports: ["3307:3306"]
    volumes:
      - users-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-db:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: products_db
    ports: ["27017:27017"]
    volumes:
      - products-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  carts-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carts_db
    ports: ["3309:3306"]
    volumes:
      - carts-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
    ports: ["3310:3306"]
    volumes:
      - orders-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  wishlist-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wishlist_db
    ports: ["3311:3306"]
    volumes:
      - wishlist-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infrastructure ──────────────────
  eureka-server:
    build: ./E-CommerceB/eurekaserver
    ports: ["8761:8761"]

  api-gateway:
    build: ./E-CommerceB/apigateway
    ports: ["8080:8080"]
    depends_on: [eureka-server]
    environment:
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761

  # ── Business Services ───────────────
  user-service:
    build: ./E-CommerceB/userservice
    ports: ["8081:8081"]
    depends_on:
      users-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://users-db:3306/users_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761

  product-service:
    build: ./E-CommerceB/productservice
    ports: ["8082:8082"]
    depends_on:
      products-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      MONGODB_URI: mongodb://products-db:27017/productservice
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761

  cart-service:
    build: ./E-CommerceB/cartservice
    ports: ["8083:8083"]
    depends_on:
      carts-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://carts-db:3306/carts_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761

  order-service:
    build: ./E-CommerceB/orderservice
    ports: ["8084:8084"]
    depends_on:
      orders-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://orders-db:3306/orders_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      CART_SERVICE_BASE_URL: http://cart-service:8083
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy

  wishlist-service:
    build: ./E-CommerceB/wishlistservice
    ports: ["8085:8085"]
    depends_on:
      wishlist-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://wishlist-db:3306/wishlist_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761

  # ── Frontend ────────────────────────
  frontend:
    build: ./E-commerceF
    ports: ["4000:4000"]
    depends_on: [api-gateway]
    environment:
      PORT: 4000

volumes:
  users-data:
  products-data:
  carts-data:
  orders-data:
  wishlist-data:
