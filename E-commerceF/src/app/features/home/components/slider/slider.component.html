<section class="">
  
        <!-- slider -->
        <swiper-container class="mySwiper" navigation="true" [pagination]="{clickable:true}" autoplay="true">
                <swiper-slide>
                        <div class="h-100 flex items-center item">
                                <div class="w-full px-20 text-white space-y-4">
                                        <h2 class="text-3xl">Fresh Products Delivered to your Door</h2>
                                        <p>Get 20% off your first order</p>
                                        <a class="btn bg-white border-2 border-white/50 text-green-500 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform" href="/products">Shop Now</a>
                                        <a class="btn bg-transparent border-2 border-white/50 text-white ml-2 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform">View Deals</a>
                                </div>
                        </div>
                </swiper-slide>
                <swiper-slide>
                        <div class="h-100 flex items-center item">
                                <div class="w-full px-20 text-white space-y-4">
                                        <h2 class="text-3xl">Premium Quality Guaranteed</h2>
                                        <p>Fresh from farm to your table</p>
                                         <a class="btn bg-white border-2 border-white/50 text-blue-500 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform">Shop Now</a>
                                        <a class="btn bg-transparent border-2 border-white/50 text-white ml-2 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform">Learn More</a>
                                </div>
                        </div>
                </swiper-slide>
                <swiper-slide>
                        <div class="h-100 flex items-center item">
                                <div class="w-full px-20 text-white space-y-4">
                                        <h2 class="text-3xl">Fast & Free Delivery</h2>
                                        <p>Same day delivery available</p>
                                         <a class="btn bg-white border-2 border-white/50 text-blue-500 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform">Order Now</a>
                                        <a class="btn bg-transparent border-2 border-white/50 text-white ml-2 inline-block px-10 py-3 rounded-md font-semibold hover:scale-105 transition-transform">Delivery Info</a>
                                </div>
                                </div>
                        
                </swiper-slide>
        </swiper-container>
    

         <app-static-items/>
</section>
