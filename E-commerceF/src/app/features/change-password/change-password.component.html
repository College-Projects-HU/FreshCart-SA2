<div class="bg-gradient-to-br from-primary via-primary to-primary text-white">
    <div class="container mx-auto px-4 py-10 sm:py-12">
        <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
            <a class="hover:text-white transition-colors duration-200" routerLink="/home">Home</a>
            <span class="text-white/40">/</span><span class="text-white font-medium">My Account</span>
        </nav>
        <div class="flex items-center gap-5">
            <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                <i class="fa-solid fa-user text-3xl"></i>
            </div>
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">My Account</h1>
                <p class="text-white/80 mt-1">Manage your addresses and account settings</p>
            </div>
        </div>
    </div>
</div>
<div class="flex flex-col lg:flex-row gap-6 lg:gap-8 mt-6">
    <aside class="w-full lg:w-72 shrink-0">
        <nav class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-bold text-gray-900">My Account</h2>
            </div>
            <ul class="p-2">
                
                <li>
                    <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group bg-green-50 text-primary-700">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors bg-green-500 text-white">
                            <i class="fa-solid fa-gear "></i>
                        </div>
                        <span class="font-medium flex-1 text-green-500">Settings</span>
                        <i class="fa-solid fa-chevron-right text-xl text-green-500"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
    <main class="flex-1 min-w-0">
        <div class="space-y-6">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-gray-900">Account Settings</h2>
                <p class="text-gray-500 text-sm mt-1">Update your profile information and change your password</p>
            </div>
            
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mb-10">
                <div class="p-6 sm:p-8">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-14 h-14 rounded-2xl bg-amber-100 flex items-center justify-center">
                            <i class="fa-solid fa-lock text-3xl text-orange-500"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900">Change Password</h3>
                            <p class="text-sm text-gray-500">Update your account password</p>
                        </div>
                    </div>
                    <form class="space-y-5" [formGroup]="changePasswordForm" (ngSubmit)="changeUserPassword()">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                            <div class="relative">
                                <input formControlName="currentPassword" placeholder="Enter your current password" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all" required="" type="password" value="">
                                <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <svg data-prefix="fas" data-icon="eye" class="svg-inline--fa fa-eye" role="img" viewBox="0 0 576 512" aria-hidden="true">
                                        <path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6-46.8 43.5-78.1 95.4-93 131.1-3.3 7.9-3.3 16.7 0 24.6 14.9 35.7 46.2 87.7 93 131.1 47.1 43.7 111.8 80.6 192.6 80.6s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1 3.3-7.9 3.3-16.7 0-24.6-14.9-35.7-46.2-87.7-93-131.1-47.1-43.7-111.8-80.6-192.6-80.6zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64-11.5 0-22.3-3-31.7-8.4-1 10.9-.1 22.1 2.9 33.2 13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-12.2-45.7-55.5-74.8-101.1-70.8 5.3 9.3 8.4 20.1 8.4 31.7z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                            <div class="relative">
                                <input formControlName="password" placeholder="Enter your new password" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all" required="" minlength="6" type="password" value="">
                                <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <svg data-prefix="fas" data-icon="eye" class="svg-inline--fa fa-eye" role="img" viewBox="0 0 576 512" aria-hidden="true">
                                        <path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6-46.8 43.5-78.1 95.4-93 131.1-3.3 7.9-3.3 16.7 0 24.6 14.9 35.7 46.2 87.7 93 131.1 47.1 43.7 111.8 80.6 192.6 80.6s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1 3.3-7.9 3.3-16.7 0-24.6-14.9-35.7-46.2-87.7-93-131.1-47.1-43.7-111.8-80.6-192.6-80.6zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64-11.5 0-22.3-3-31.7-8.4-1 10.9-.1 22.1 2.9 33.2 13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-12.2-45.7-55.5-74.8-101.1-70.8 5.3 9.3 8.4 20.1 8.4 31.7z"></path>
                                    </svg>
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Must be at least 6 characters</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
                            <div class="relative">
                                <input formControlName="rePassword" placeholder="Confirm your new password" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all" required="" type="password" value="">
                                <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <svg data-prefix="fas" data-icon="eye" class="svg-inline--fa fa-eye" role="img" viewBox="0 0 576 512" aria-hidden="true">
                                        <path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6-46.8 43.5-78.1 95.4-93 131.1-3.3 7.9-3.3 16.7 0 24.6 14.9 35.7 46.2 87.7 93 131.1 47.1 43.7 111.8 80.6 192.6 80.6s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1 3.3-7.9 3.3-16.7 0-24.6-14.9-35.7-46.2-87.7-93-131.1-47.1-43.7-111.8-80.6-192.6-80.6zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64-11.5 0-22.3-3-31.7-8.4-1 10.9-.1 22.1 2.9 33.2 13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-12.2-45.7-55.5-74.8-101.1-70.8 5.3 9.3 8.4 20.1 8.4 31.7z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="pt-4">
                            <button type="submit" class="cursor-pointer inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-amber-600 text-white font-semibold hover:bg-amber-700 transition-colors disabled:opacity-50 shadow-lg shadow-amber-600/25">
                                <i class="fa-solid fa-lock text-xl text-white"></i>
                                Change Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
