

  <!-- ════════════════════════════════════════════════
       HEADER
  ════════════════════════════════════════════════ -->
  <header class="sticky top-0 z-50 border-b border-slate-200/50 shadow-sm"
          style="background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);">
    <div class="px-4 sm:px-6 py-4 flex justify-between items-center">

      <!-- Left: Menu + Logo + Brand -->
      <div class="flex items-center space-x-3">

        <!-- Mobile hamburger -->
        <button
          (click)="toggleSidebar()"
          aria-label="Open menu"
          class="lg:hidden w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-sky-500"
        >
          <!-- bars icon -->
          <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <!-- Logo mark -->
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center shadow-md shadow-sky-100 hover:shadow-lg hover:shadow-sky-200 transition-all duration-300">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
        </div>

        <!-- Brand text -->
        <div class="hidden sm:block">
          <h1 class="text-xl font-bold text-slate-800 tracking-tight">Analytics FreshCart</h1>
          <p class="text-xs text-slate-500 font-medium">Corporate Performance Insights</p>
        </div>
      </div>

      <!-- Right: Refresh + Profile -->
      <div class="flex items-center space-x-3 sm:space-x-4">

        <!-- Refresh button -->
        <button
          (click)="logOut()"
          title="Refresh Data"
          class="w-9 cursor-pointer h-9 rounded-xl bg-slate-100 hover:bg-sky-100 hover:text-sky-600 flex items-center justify-center transition-all duration-200"
        >
          <i class="fa-solid fa-arrow-right-from-bracket  text-slate-600 "></i>
        </button>

        <!-- Profile -->
        <div class="flex items-center space-x-3 group cursor-pointer">
          <div class="relative">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center border-2 border-white shadow-md transition-all duration-300 group-hover:scale-105">
              <span class="text-white text-sm font-bold select-none">{{InitN}}</span>
            </div>
            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
          </div>
          <div class="hidden sm:block">
            <p class="text-sm font-semibold text-slate-800">{{nameU}}</p>
            <p class="text-xs text-slate-500 font-medium">Administrator</p>
          </div>
        </div>

      </div>
    </div>
  </header>
