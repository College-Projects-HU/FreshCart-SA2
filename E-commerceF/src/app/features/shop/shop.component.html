<div class="bg-gradient-to-br from-primary via-primary to-primary text-white">
    <div class="container mx-auto px-4 py-10 sm:py-14">
        <nav class="flex items-center gap-2 text-sm text-white/70 mb-6 flex-wrap">
            <a class="hover:text-white transition-colors" routerLink="/home">Home</a>
            <span class="text-white/40">/</span><span class="text-white font-medium">All Products</span>
        </nav>
        <div class="flex items-center gap-5">
            <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                <i class="fa-solid fa-box-open text-4xl"></i>
            </div>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Products</h1>
                <p class="text-white/80 mt-1">Explore our complete product collection</p>
            </div>
        </div>
    </div>
</div>
<div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
     @for (product of productList(); track product.id) {
                <div
          class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow duration-300 group font-sans"
        >
          <div class="relative overflow-hidden mb-4">
            <img
              [src]="product.imageCover"
              [alt]="product.title"
              class="w-full h-auto object-contain"
            />

            <!--  ! ----------- Icons  Heart ! ----------- ....  -->
            <div class="absolute top-2 right-2 flex flex-col gap-2">
              <button
              (click)="addToWishlist(product.id)"
                         [style.color]="wishlistIds().includes(product.id) ? 'red' : 'gray'"
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="far fa-heart"
                class="fa-regular fa-heart" [class.fas]="wishlistIds().includes(product.id)"
                            [class.far]="!wishlistIds().includes(product.id)"></i>
              </button>

              <button
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="fas fa-sync-alt"></i>
              </button>

              <button
                [routerLink]="['/details' , product.id , product.slug]"
                class="w-10 cursor-pointer h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="space-y-1">
            <p class="text-xs text-gray-400 tracking-wide">{{product.category.name}}</p>

            <h3
              class="text-lg font-medium text-slate-800 hover:text-emerald-600 cursor-pointer transition-colors"
            >
              {{product.title}}
            </h3>

            <div class="flex items-center gap-1">
              <div class="flex text-yellow-400 text-xs gap-0.5">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="far fa-star text-gray-300"></i>
              </div>
              <span class="text-xs text-gray-400 font-medium">
                {{product.ratingsAverage}} ({{product.ratingsQuantity}})</span
              >
            </div>

            <div class="flex items-center justify-between pt-2">
              <div class="flex flex-col">
                <span class="text-lg font-medium text-slate-900"> {{product.price}} EGP</span>
              </div>

              <button
              (click)="addToCart(product._id)"
                class="w-10 h-10 cursor-pointer bg-emerald-600 text-white rounded-lg flex items-center justify-center hover:bg-emerald-700 transition-colors shadow-sm active:scale-95"
              >
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
            }
            </div>
    </div>
